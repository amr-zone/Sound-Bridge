<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SoundBridge — الجسر الصوتي</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ==================== CSS VARIABLES ==================== */
:root {
  /* Colors - Dark Theme */
  --bg-primary: #070b14;
  --bg-secondary: #0d1525;
  --bg-card: #111927;
  --bg-glass: rgba(17, 25, 39, 0.7);
  --border: rgba(99, 179, 237, 0.12);
  --border-glow: rgba(99, 179, 237, 0.3);

  --accent-cyan: #38bdf8;
  --accent-blue: #6366f1;
  --accent-purple: #a855f7;
  --accent-teal: #2dd4bf;
  --accent-orange: #fb923c;

  --text-primary: #f0f6ff;
  --text-secondary: #94a3b8;
  --text-muted: #475569;

  --gradient-hero: linear-gradient(135deg, #070b14 0%, #0d1a2e 50%, #0a1628 100%);
  --gradient-accent: linear-gradient(135deg, #38bdf8, #6366f1);
  --gradient-card: linear-gradient(145deg, rgba(17,25,39,0.9), rgba(13,21,37,0.95));

  /* Fonts */
  --font-en: 'Outfit', sans-serif;
  --font-ar: 'Noto Kufi Arabic', sans-serif;

  /* Spacing */
  --nav-h: 70px;
  --section-py: clamp(60px, 10vw, 120px);
  --container: min(1200px, 92vw);

  /* Transitions */
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg-primary: #f0f6ff;
  --bg-secondary: #e8f0fb;
  --bg-card: #ffffff;
  --bg-glass: rgba(255,255,255,0.8);
  --border: rgba(99, 179, 237, 0.2);
  --border-glow: rgba(99, 102, 241, 0.3);

  --text-primary: #0f172a;
  --text-secondary: #334155;
  --text-muted: #64748b;

  --gradient-hero: linear-gradient(135deg, #dbeafe 0%, #ede9fe 50%, #cffafe 100%);
  --gradient-card: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(240,246,255,0.9));
}

/* ==================== RESET & BASE ==================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--font-en);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
  transition: background var(--transition-slow), color var(--transition-slow);
}

[data-lang="ar"] body,
[data-lang="ar"] {
  font-family: var(--font-ar);
  direction: rtl;
}

[data-lang="ar"] .lang-en { display: none !important; }
[data-lang="en"] .lang-ar { display: none !important; }

img { max-width: 100%; display: block; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

.container { width: var(--container); margin: 0 auto; }

/* ==================== SCROLLBAR ==================== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 3px; }

/* ==================== NAVBAR ==================== */
#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  z-index: 1000;
  transition: background var(--transition), backdrop-filter var(--transition), box-shadow var(--transition);
}

#navbar.scrolled {
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 1px 0 var(--border);
}

.nav-inner {
  width: var(--container);
  margin: 0 auto;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 1.2rem;
  letter-spacing: -0.02em;
}

.logo-icon {
  width: 36px; height: 36px;
  background: var(--gradient-accent);
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-size: 1rem;
  flex-shrink: 0;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: color var(--transition);
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0; right: 0;
  height: 2px;
  background: var(--gradient-accent);
  transform: scaleX(0);
  transition: transform var(--transition);
}
.nav-links a:hover { color: var(--text-primary); }
.nav-links a:hover::after { transform: scaleX(1); }

.nav-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.ctrl-btn {
  height: 38px;
  padding: 0 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 0.8rem;
  font-weight: 600;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all var(--transition);
}
.ctrl-btn:hover {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
  background: rgba(56, 189, 248, 0.08);
}

.hamburger {
  display: none;
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.hamburger span {
  display: block;
  width: 18px; height: 2px;
  background: var(--text-secondary);
  border-radius: 2px;
  transition: all var(--transition);
}

/* Mobile Nav */
.mobile-nav {
  display: none;
  position: fixed;
  top: var(--nav-h); left: 0; right: 0;
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 20px var(--container);
  z-index: 999;
  flex-direction: column;
  gap: 4px;
  transform: translateY(-10px);
  opacity: 0;
  transition: all var(--transition);
}
.mobile-nav.open {
  opacity: 1;
  transform: translateY(0);
}
.mobile-nav a {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all var(--transition);
}
.mobile-nav a:hover {
  background: rgba(56,189,248,0.08);
  color: var(--accent-cyan);
}

/* ==================== HERO ==================== */
#hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding-top: var(--nav-h);
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: var(--gradient-hero);
  z-index: 0;
}

/* Animated mesh orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: float 8s ease-in-out infinite;
}
.orb-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #38bdf8, transparent 70%);
  top: -100px; left: -100px;
  animation-delay: 0s;
}
.orb-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #6366f1, transparent 70%);
  top: 50%; right: -100px;
  animation-delay: -3s;
}
.orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, #a855f7, transparent 70%);
  bottom: -80px; left: 30%;
  animation-delay: -6s;
}

@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-30px) scale(1.05); }
}

/* Grid pattern overlay */
.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 820px;
  padding: 40px 20px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  border-radius: 100px;
  border: 1px solid var(--border-glow);
  background: rgba(56,189,248,0.08);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent-cyan);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 28px;
  animation: fadeInUp 0.8s ease both;
}

.badge-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent-cyan);
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.hero-title {
  font-size: clamp(3rem, 9vw, 7rem);
  font-weight: 900;
  line-height: 1.0;
  letter-spacing: -0.04em;
  margin-bottom: 12px;
  animation: fadeInUp 0.8s ease 0.1s both;
}

.hero-title .gradient-text {
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  color: var(--accent-teal);
  font-weight: 500;
  margin-bottom: 20px;
  letter-spacing: 0.01em;
  animation: fadeInUp 0.8s ease 0.15s both;
}

.hero-desc {
  font-size: clamp(0.95rem, 2vw, 1.1rem);
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto 40px;
  line-height: 1.7;
  animation: fadeInUp 0.8s ease 0.2s both;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  animation: fadeInUp 0.8s ease 0.3s both;
}

.btn-primary {
  padding: 14px 32px;
  border-radius: 100px;
  background: var(--gradient-accent);
  color: #fff;
  font-weight: 700;
  font-size: 0.95rem;
  font-family: inherit;
  transition: all var(--transition);
  box-shadow: 0 0 30px rgba(56,189,248,0.3);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 50px rgba(56,189,248,0.5);
}

.btn-secondary {
  padding: 14px 32px;
  border-radius: 100px;
  border: 1px solid var(--border-glow);
  color: var(--text-primary);
  font-weight: 600;
  font-size: 0.95rem;
  font-family: inherit;
  background: transparent;
  transition: all var(--transition);
}
.btn-secondary:hover {
  background: rgba(56,189,248,0.08);
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
}

/* Hero stats */
.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  justify-content: center;
  margin-top: 60px;
  animation: fadeInUp 0.8s ease 0.4s both;
}

.stat-item {
  text-align: center;
}
.stat-num {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 900;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.stat-label {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-weight: 500;
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.stat-divider {
  width: 1px;
  background: var(--border);
  align-self: stretch;
}

/* Scroll indicator */
.scroll-indicator {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  font-size: 0.75rem;
  animation: fadeInUp 1s ease 0.8s both;
}
.scroll-mouse {
  width: 24px; height: 38px;
  border: 2px solid var(--text-muted);
  border-radius: 12px;
  display: flex;
  justify-content: center;
  padding-top: 6px;
}
.scroll-dot {
  width: 4px; height: 8px;
  background: var(--accent-cyan);
  border-radius: 2px;
  animation: scrollDot 2s ease infinite;
}
@keyframes scrollDot {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(12px); }
}

/* ==================== SECTION BASE ==================== */
section {
  padding: var(--section-py) 0;
  position: relative;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent-cyan);
  margin-bottom: 16px;
}

.section-label::before {
  content: '';
  display: block;
  width: 24px; height: 2px;
  background: var(--accent-cyan);
}

[data-lang="ar"] .section-label::before { display: none; }
[data-lang="ar"] .section-label::after {
  content: '';
  display: block;
  width: 24px; height: 2px;
  background: var(--accent-cyan);
}

.section-title {
  font-size: clamp(1.8rem, 5vw, 3.2rem);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.03em;
  margin-bottom: 16px;
}

.section-desc {
  font-size: clamp(0.95rem, 1.8vw, 1.05rem);
  color: var(--text-secondary);
  max-width: 560px;
  line-height: 1.75;
}

/* ==================== PROBLEM ==================== */
#problem { background: var(--bg-secondary); }

.problem-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  margin-top: 56px;
}

.problem-card {
  padding: 32px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--gradient-card);
  position: relative;
  overflow: hidden;
  transition: all var(--transition);
  opacity: 0;
  transform: translateY(30px);
}
.problem-card.visible {
  opacity: 1;
  transform: translateY(0);
}
.problem-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(56,189,248,0.05), transparent 60%);
  opacity: 0;
  transition: opacity var(--transition);
}
.problem-card:hover::before { opacity: 1; }
.problem-card:hover { border-color: var(--border-glow); transform: translateY(-4px); }

.problem-icon {
  font-size: 2.5rem;
  margin-bottom: 20px;
}
.problem-card h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 10px;
}
.problem-card p {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.65;
}

.problem-highlight {
  grid-column: 1 / -1;
  padding: 36px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(99,102,241,0.1));
  border: 1px solid rgba(56,189,248,0.2);
  text-align: center;
}
.problem-highlight .big-num {
  font-size: clamp(3rem, 8vw, 5rem);
  font-weight: 900;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.problem-highlight p {
  font-size: 1rem;
  color: var(--text-secondary);
  margin-top: 10px;
}

/* ==================== SOLUTION ==================== */
#solution { overflow: hidden; }

.solution-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.solution-visual {
  position: relative;
  height: 420px;
}

.device-card {
  position: absolute;
  background: var(--gradient-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  transition: all var(--transition);
}
.device-card:hover { transform: scale(1.03); border-color: var(--border-glow); }

.device-card-main {
  width: 220px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  background: linear-gradient(135deg, rgba(56,189,248,0.12), rgba(99,102,241,0.12));
  border-color: rgba(56,189,248,0.25);
  text-align: center;
  padding: 28px;
}

.device-card-main .device-icon { font-size: 3.5rem; }
.device-card-main h3 { font-size: 1rem; font-weight: 700; }
.device-card-main p { font-size: 0.78rem; color: var(--accent-cyan); font-weight: 600; }

.device-card-sm {
  width: 160px;
  z-index: 2;
}
.device-card-sm:nth-child(2) { top: 20px; left: 0; }
.device-card-sm:nth-child(3) { top: 20px; right: 0; }
.device-card-sm:nth-child(4) { bottom: 30px; left: 20px; }
.device-card-sm:nth-child(5) { bottom: 30px; right: 20px; }

.device-card-sm .device-icon { font-size: 1.8rem; }
.device-card-sm h4 { font-size: 0.82rem; font-weight: 700; }
.device-card-sm span { font-size: 0.72rem; color: var(--text-muted); }

/* Connecting lines */
.connect-line {
  position: absolute;
  background: linear-gradient(90deg, transparent, rgba(56,189,248,0.4), transparent);
  height: 1px;
  z-index: 1;
  animation: lineFlow 3s ease-in-out infinite;
}

@keyframes lineFlow {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.solution-content .section-desc { margin-bottom: 28px; }

.solution-features {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 28px;
}
.sol-feat {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  transition: all var(--transition);
}
.sol-feat:hover { border-color: var(--border-glow); background: rgba(56,189,248,0.05); }
.sol-feat-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--gradient-accent);
  display: grid;
  place-items: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.sol-feat-text h4 { font-size: 0.9rem; font-weight: 700; }
.sol-feat-text p { font-size: 0.8rem; color: var(--text-secondary); }

/* ==================== HOW IT WORKS ==================== */
#how { background: var(--bg-secondary); }

.steps-container {
  margin-top: 56px;
  position: relative;
}

.steps-line {
  position: absolute;
  left: 24px;
  top: 24px;
  bottom: 24px;
  width: 2px;
  background: linear-gradient(to bottom, var(--accent-cyan), var(--accent-purple));
  z-index: 0;
}

[data-lang="ar"] .steps-line {
  left: auto;
  right: 24px;
}

.steps-grid {
  display: grid;
  gap: 24px;
  position: relative;
  z-index: 1;
}

.step-card {
  display: grid;
  grid-template-columns: 50px 1fr;
  gap: 24px;
  align-items: start;
  padding: 28px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--gradient-card);
  transition: all var(--transition);
  opacity: 0;
  transform: translateX(-20px);
}
.step-card.visible { opacity: 1; transform: translateX(0); }
[data-lang="ar"] .step-card.visible { transform: translateX(0); }
[data-lang="ar"] .step-card { transform: translateX(20px); }

.step-card:hover { border-color: var(--border-glow); transform: translateX(8px); }
[data-lang="ar"] .step-card:hover { transform: translateX(-8px); }

.step-num {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: var(--gradient-accent);
  display: grid;
  place-items: center;
  font-size: 1.1rem;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(56,189,248,0.4);
}

.step-body h3 {
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 8px;
}
.step-body p {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.65;
}

/* ==================== DEVICES ==================== */
#devices { overflow: hidden; }

.devices-intro {
  text-align: center;
  max-width: 600px;
  margin: 0 auto 60px;
}
.devices-intro .section-label { justify-content: center; }
.devices-intro .section-label::before { display: none; }

.devices-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.device-full-card {
  border-radius: 24px;
  border: 1px solid var(--border);
  background: var(--gradient-card);
  overflow: hidden;
  transition: all var(--transition);
  opacity: 0;
  transform: translateY(40px);
}
.device-full-card.visible { opacity: 1; transform: translateY(0); }
.device-full-card:hover {
  border-color: var(--border-glow);
  transform: translateY(-8px);
  box-shadow: 0 30px 80px rgba(56,189,248,0.1);
}

.device-header {
  padding: 36px 28px 24px;
  text-align: center;
  background: linear-gradient(135deg, rgba(56,189,248,0.08), rgba(99,102,241,0.08));

}
.device-emoji { font-size: 4rem; margin-bottom: 12px; }
.device-header h3 { font-size: 1.1rem; font-weight: 800; }
.device-header .device-sub { font-size: 0.78rem; color: var(--accent-cyan); font-weight: 600; margin-top: 4px; }

.device-specs {
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.spec-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.spec-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-cyan);
  flex-shrink: 0;
